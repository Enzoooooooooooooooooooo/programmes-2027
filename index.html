<html lang="fr">
<head>

<style>
  :root{
    --bg:#0E1115; --bg-2:#141922; --surface:#1A212B; --surface-2:#232C38;
    --ink:#ECE8DC; --muted:#9AA1AA; --faint:#6B7280;
    --line:rgba(236,232,220,.12); --line-strong:rgba(236,232,220,.24);
    --gold:#C6A052; --gold-2:#E2C588; --gold-soft:rgba(198,160,82,.13);
    --night:#26344F; --brick:#C0664A;
    --radius:16px; --maxw:1140px;
    --shadow:0 2px 4px rgba(0,0,0,.25), 0 24px 60px -28px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:'Archivo',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(120% 80% at 85% -8%, rgba(198,160,82,.10), transparent 58%),radial-gradient(110% 80% at -5% 108%, rgba(38,52,79,.30), transparent 55%);

  h1,h2,h3,h4{font-family:'Spectral',Georgia,serif;font-weight:700;line-height:1.08;letter-spacing:-.01em;margin:0}
  .serif{font-family:'Spectral',Georgia,serif}
  a,.ilink{color:var(--gold-2);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
  button{font-family:inherit}
  ::selection{background:var(--gold);color:#1a1408}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600}

  header.top{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(14,17,21,.94),rgba(14,17,21,.78));backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  header.top::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
  .topbar{display:flex;align-items:center;gap:20px;height:66px}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;border:0;background:none;padding:0;color:var(--ink)}
  .brand .name{font-family:'Spectral';font-weight:700;font-size:19px;letter-spacing:.02em}
  nav.tabs{display:flex;gap:4px;margin-left:auto}
  nav.tabs button{border:0;background:none;color:var(--muted);cursor:pointer;padding:9px 14px;border-radius:10px;font-size:14.5px;font-weight:500}
  nav.tabs button:hover{color:var(--ink);background:rgba(236,232,220,.05)}
  nav.tabs button[aria-current="true"]{color:var(--gold-2);background:var(--gold-soft)}
  main{padding:0 0 100px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;border-radius:11px;font-weight:600;font-size:15px;padding:12px 20px;border:1px solid transparent;transition:transform .12s,background .15s,border-color .15s}
  .btn:active{transform:translateY(1px)}
  .btn-lg{padding:15px 26px;font-size:16.5px}
  .btn-gold{background:linear-gradient(180deg,var(--gold-2),var(--gold));color:#211803;box-shadow:0 6px 22px -10px rgba(198,160,82,.7)}
  .btn-gold:hover{filter:brightness(1.06)}
  .btn-outline{background:transparent;border-color:var(--line-strong);color:var(--ink)}
  .btn-outline:hover{border-color:var(--gold);color:var(--gold-2)}
  .btn-ghost{background:rgba(236,232,220,.04);border:1px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{background:rgba(236,232,220,.08)}
  .btn-quiet{background:none;border:0;color:var(--muted);cursor:pointer;font-weight:600;font-size:14px;padding:8px 6px}
  .btn-quiet:hover{color:var(--ink)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  *:focus-visible{outline:2.5px solid var(--gold);outline-offset:2px;border-radius:8px}

  /* Accueil */
  .hero{padding:70px 0 64px;position:relative;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:30px;align-items:center}
  .slogan{font-size:clamp(54px,10vw,112px);font-weight:800;letter-spacing:-.035em;margin:16px 0 0}
  .slogan em{display:block;color:var(--gold);font-style:italic;font-weight:700}
  .hero .lead{color:var(--muted);font-size:18px;max-width:48ch;margin:22px 0 0}

  .hero-deco{display:flex;justify-content:center;align-items:center}

  .page{padding:48px 0}
  .section-title{font-size:clamp(30px,5vw,42px);margin:0 0 10px}
  .lead{color:var(--muted);font-size:17px;max-width:62ch}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
  .prose p{margin:0 0 12px} .prose h4{font-size:20px;margin:22px 0 8px;color:var(--gold-2)} .prose ul{margin:6px 0 12px;padding-left:20px} .prose li{margin:4px 0}
  .placeholder{border:1px dashed var(--line-strong);border-radius:12px;background:repeating-linear-gradient(135deg,transparent,transparent 10px,rgba(198,160,82,.06) 10px,rgba(198,160,82,.06) 20px);padding:16px 18px;color:var(--muted);font-style:italic}
  .placeholder b{display:inline-block;color:var(--gold);font-style:normal;font-size:11px;letter-spacing:.12em;margin-bottom:4px}

  label.fld{display:block;margin-bottom:15px}
  label.fld span{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  input[type=text],input[type=email],textarea,select{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:12px 13px;font-family:inherit;font-size:15px;background:var(--bg-2);color:var(--ink)}

  /* Comparateur avancé (config) */
  .config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin:8px 0 24px}
  .config-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px}

  .slider{width:100%;accent-color:var(--gold);margin:14px 0 6px}

  .q-content{position:relative;padding:30px}
  .q-theme{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-2);font-weight:700}
  .q-label{font-size:clamp(24px,4.4vw,36px);margin:10px 0 20px;max-width:20ch}

  .options{display:flex;flex-direction:column;gap:11px}
  .opt{position:relative;text-align:left;cursor:pointer;background:var(--bg-2);border:1.5px solid var(--line-strong);border-radius:13px;padding:16px 18px 16px 52px;font-size:16px;color:var(--ink);transition:border-color .12s,background .12s;width:100%}
  .opt:hover{border-color:var(--gold)}
  .opt .tick{position:absolute;left:17px;top:50%;transform:translateY(-50%);width:21px;height:21px;border-radius:6px;border:2px solid var(--line-strong);display:grid;place-items:center;transition:.12s}
  .opt[aria-pressed="true"]{border-color:var(--gold);background:var(--gold-soft)}
  .opt[aria-pressed="true"] .tick{border-color:var(--gold);background:var(--gold)}
  .opt[aria-pressed="true"] .tick svg{width:13px;height:13px;color:#211803}
  .special{display:flex;gap:11px;margin-top:16px;flex-wrap:wrap}
  .special .opt{flex:1;min-width:210px;padding:14px 18px;text-align:center;font-weight:600;font-size:14.5px}
  .special .opt.none[aria-pressed="true"]{border-color:var(--brick);background:rgba(192,102,74,.14);color:#e7a18b}
  .special .opt.ign[aria-pressed="true"]{border-color:var(--muted);background:rgba(236,232,220,.06);color:var(--ink)}
  .quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px}

  /* Préclassement */
  .rank-list{display:flex;flex-direction:column;gap:9px;margin:18px 0}
  .rank-item{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 14px}
  .rank-item .pos{font-family:'Spectral';font-size:20px;color:var(--gold);width:26px;text-align:center;flex:none}
  .rank-item .who{flex:1;min-width:0}
  .rank-item .who .nm{font-weight:700}
  .rank-item .who .pty{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px}
  .rank-item .moves{display:flex;flex-direction:column;gap:3px}
  .rank-item .moves button{width:30px;height:22px;border-radius:6px;border:1px solid var(--line-strong);background:var(--bg-2);color:var(--muted);cursor:pointer;display:grid;place-items:center}
  .rank-item .moves button:hover:not(:disabled){color:var(--gold);border-color:var(--gold)}
  .rank-item .moves button:disabled{opacity:.3;cursor:default}
  .rank-item .grip{flex:none;width:30px;height:34px;border:1px solid var(--line);border-radius:8px;background:var(--bg-2);color:var(--muted);cursor:grab;display:grid;place-items:center;touch-action:none;-webkit-user-select:none;user-select:none}
  .rank-item .grip:active{cursor:grabbing;color:var(--gold);border-color:var(--gold)}
  .rank-item{transition:box-shadow .15s,transform .05s,opacity .15s}
  .rank-item.dragging{box-shadow:0 14px 36px -12px rgba(0,0,0,.8);border-color:var(--gold);opacity:.96;position:relative;z-index:5}

  /* Tutoriel pas-à-pas (spotlight) */
  .tuto-static{padding-left:18px!important;cursor:default}
  .tour{position:fixed;inset:0;z-index:200}
  .tour-catch{position:absolute;inset:0;pointer-events:auto;z-index:200}
  .tour-hole{position:fixed;border-radius:14px;box-shadow:0 0 0 9999px rgba(8,10,13,.84);border:2px solid var(--gold);pointer-events:none;z-index:201;transition:top .25s,left .25s,width .25s,height .25s}
  .tour-tip{position:fixed;width:min(330px,calc(100vw - 24px));background:var(--surface);border:1px solid var(--line-strong);border-radius:14px;padding:16px 16px 12px;box-shadow:var(--shadow);z-index:202}
  .tour-tip p{margin:0 0 12px;font-size:14.5px}
  .tour-foot{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .tour-dots{display:inline-flex;gap:5px}
  .tour-dots i{width:7px;height:7px;border-radius:50%;background:var(--line-strong)}
  .tour-dots i.on{background:var(--gold)}
  .rrow .rk-score{font-family:'Spectral';font-weight:700;font-size:24px;flex:none;width:46px;text-align:right;font-variant-numeric:tabular-nums}

  /* Tutoriel */
  .tuto-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:26px}
  .callout{display:flex;gap:12px;align-items:flex-start;background:var(--bg-2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:13px 15px;margin-top:11px}
  .callout .ci{flex:none;color:var(--gold);margin-top:1px}
  .callout b{display:block;font-size:14px} .callout p{margin:2px 0 0;color:var(--muted);font-size:13.5px}
  .tuto-opt{background:var(--bg-2);border:1.5px solid var(--line-strong);border-radius:11px;padding:13px 16px;margin-top:9px;color:var(--muted)}

  /* Résultats */
  .res-banner{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);margin-bottom:18px;background:radial-gradient(130% 120% at 80% -30%, rgba(198,160,82,.22), transparent 55%),linear-gradient(180deg,var(--night),var(--surface))}
  .res-banner .inner{position:relative;padding:30px}
  .res-banner h2{font-size:clamp(30px,6vw,48px)}
  .res-banner p{color:var(--ink);max-width:62ch;margin:10px 0 0;opacity:.92}
  .segmented{display:inline-flex;background:var(--bg-2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:3px;margin:4px 0 18px;flex-wrap:wrap}
  .segmented button{border:0;background:none;color:var(--muted);font-weight:600;font-size:14px;padding:8px 15px;border-radius:8px;cursor:pointer}
  .segmented button[aria-current="true"]{background:var(--gold-soft);color:var(--gold-2)}

  .rrow{display:flex;align-items:center;gap:15px;padding:14px 18px;border:1px solid var(--line);border-radius:14px;background:var(--surface);margin-bottom:10px}
  .rrow .rk{font-family:'Spectral';font-size:22px;width:32px;flex:none;text-align:center}
  .avatar{display:inline-grid;place-items:center;border-radius:50%;overflow:hidden;flex:none;border:1.5px solid var(--line-strong);background:var(--bg-2)}
  .avatar-img{width:100%;height:100%;object-fit:cover}
  .avatar-ini{font-family:'Spectral';font-weight:700;color:var(--gold-2);font-size:15px}
  .rrow .who{flex:1;min-width:0}
  .rrow .who .nm{font-weight:700;font-size:16.5px}
  .rrow .who .pty{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:7px;margin-top:2px}
  .logo{height:16px;width:auto;max-width:28px;object-fit:contain;border-radius:3px}
  .dot{width:11px;height:11px;border-radius:50%;flex:none;display:inline-block}
  .rrow .bar{flex:1.4;height:10px;background:var(--line);border-radius:20px;overflow:hidden;min-width:70px}
  .rrow .bar > i{display:block;height:100%;border-radius:20px}

  .theme-picker{display:flex;align-items:center;gap:12px;margin:4px 0 16px;flex-wrap:wrap}
  .theme-picker select{max-width:340px}

  .measures{margin-top:18px}
  .measure{border:1px solid var(--line);border-radius:13px;background:var(--surface);padding:16px 18px;margin-bottom:11px}
  .measure .ml{font-weight:700;font-size:16px;margin-bottom:8px}
  .kept{font-size:15px;padding:8px 0;border-top:1px dashed var(--line)}
  .kept:first-of-type{border-top:0}
  .cred{display:inline-flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:20px;padding:3px 11px 3px 4px}
  .chip .avatar{width:22px;height:22px;border-width:1px} .chip .avatar-ini{font-size:10px}
  .muted{color:var(--muted)}

  /* Comparer */
  .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .compare-col h4{font-size:14px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:12px;font-family:'Archivo';font-weight:700}
  .cmp{display:flex;align-items:center;gap:11px;padding:9px 12px;border:1px solid var(--line);border-radius:11px;background:var(--surface);margin-bottom:8px}
  .cmp .n{font-family:'Spectral';color:var(--gold);width:22px;text-align:center;flex:none;font-size:17px}
  .cmp .nm{font-weight:600;font-size:14.5px}
  .cmp .delta{margin-left:auto;font-size:12px;font-variant-numeric:tabular-nums}

  .empty{text-align:center;color:var(--muted);padding:60px 10px}
  .row-gap{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .mt{margin-top:20px}.mt-s{margin-top:10px}

  footer{border-top:1px solid var(--line);margin-top:30px}
  footer::before{content:"";display:block;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 0;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .modal-bg{position:fixed;inset:0;background:rgba(8,10,13,.66);display:grid;place-items:center;z-index:50;padding:20px;backdrop-filter:blur(3px)}
  .modal{background:var(--surface);border:1px solid var(--line-strong);border-radius:18px;max-width:600px;width:100%;padding:28px;max-height:86vh;overflow:auto;box-shadow:var(--shadow)}

  .prog{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .prog:last-child{border-bottom:0}

  .fade{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
  @media (max-width:760px){.hero-grid{grid-template-columns:1fr}.hero-deco{order:-1}.compare-grid{grid-template-columns:1fr}nav.tabs button{padding:9px 10px;font-size:13.5px}}

<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useMemo,useEffect,useLayoutEffect,useRef,createContext,useContext} = React;

/* ───── Lecture de la configuration (config.js) avec replis sûrs ───── */
const CFG = window.CONFIG || {};
const T = Object.assign({
  marque:"Programmes 2027", eyebrowAccueil:"Comparateur de programmes",
  slogan1:"Voter", slogan2:"librement", accroche:"", aproposTitre:"Quel est cet outil ?",
  contactIntro:"", preclassIntro:"", tuto:{intro:"",aucune:"",ignorer:""}, profondeur:["","",""],
}, CFG.textes||{});
const APROPOS = CFG.apropos || [];
const COHERENCE = CFG.coherence || [{max:100,msg:""}];
const candCfg  = name => (CFG.candidats||{})[name] || {};
const imgTheme = t => (CFG.imagesThemes||{})[t] || "";
const TEST_CANDS = (CFG.test&&CFG.test.candidats) || [];
const TEST_PRIO  = (CFG.test&&CFG.test.priorite) || 1;

/* Aucune donnée d'exemple : l'outil n'utilise QUE Comparaison_programmes.xlsx. */

/* ───── Parseur ───── */
const NAME_COL=0, PARTY_COL=1, FIRST=2;
const clean = v => (v===null||v===undefined)?"":String(v).trim();
function parseSheet(rows){
  const themeRow=rows[0]||[],labelRow=rows[1]||[],prioRow=rows[2]||[];
  const cols=[]; const maxCol=Math.max(themeRow.length,labelRow.length,prioRow.length);
  for(let c=FIRST;c<maxCol;c++) if(clean(labelRow[c])!=="") cols.push(c);
  let last=""; const tbc={};
  for(let c=FIRST;c<=(cols[cols.length-1]??FIRST);c++){ if(clean(themeRow[c])!=="") last=clean(themeRow[c]); tbc[c]=last||"Sans thème"; }
  const problems=cols.map((c,i)=>({id:"p"+i,col:c,theme:tbc[c],label:clean(labelRow[c])||("Problématique "+(i+1)),
    priority: clean(prioRow[c])!==""&&Number.isFinite(Number(prioRow[c]))?Number(prioRow[c]):99}));
  const candidates=[],propos={};
  for(let r=3;r<rows.length;r++){ const name=clean(rows[r][NAME_COL]); if(name==="")continue;
    const id="c"+candidates.length; candidates.push({id,name,party:clean(rows[r][PARTY_COL])});
    propos[id]={}; problems.forEach(p=>{propos[id][p.id]=clean(rows[r][p.col]);}); }
  const themes=[]; problems.forEach(p=>{if(!themes.includes(p.theme))themes.push(p.theme);});
  const priorities=[...new Set(problems.map(p=>p.priority))].sort((a,b)=>a-b);
  return {problems,candidates,propos,themes,priorities};
}
const partyOf = (name, fallback) => candCfg(name).parti || fallback || "";
const colorOf = name => candCfg(name).couleur || "var(--gold)";

const normProp = t => clean(t).toLowerCase().replace(/\s+/g," ");
function shuffle(arr,seed){const a=[...arr];let s=seed||1;const r=()=>{s=(s*9301+49297)%233280;return s/233280;};
  for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildQuestions(model,{candidateIds,priorities,themes}){
  const incl=new Set(candidateIds); const qs=[];
  model.problems.forEach((p,idx)=>{
    if(priorities&&!priorities.has(p.priority))return;
    if(themes&&!themes.has(p.theme))return;
    const g=new Map();
    model.candidates.forEach(c=>{ if(!incl.has(c.id))return; const txt=model.propos[c.id][p.id]; if(!txt)return;
      const k=normProp(txt); if(!g.has(k))g.set(k,{id:"o"+g.size,text:txt,candidateIds:[]}); g.get(k).candidateIds.push(c.id); });
    if(g.size===0)return;
    qs.push({problemId:p.id,theme:p.theme,label:p.label,priority:p.priority,options:shuffle([...g.values()],idx*97+13)});
  });
  return qs;
}

/* Comptage : renvoie une liste classée (avec rang + égalités) sur un sous-ensemble de paires {q,a}. */
function tally(pairs, candidateIds, model){
  const pts={}; candidateIds.forEach(id=>pts[id]=0); let answered=0;
  pairs.forEach(({q,a})=>{
    if(!a||a.type==="ignore")return; answered++;
    if(a.type==="none"){candidateIds.forEach(id=>pts[id]-=1);return;}
    if(a.type==="pick"){a.optIds.forEach(oid=>{const o=q.options.find(o=>o.id===oid); if(o)o.candidateIds.forEach(c=>{if(c in pts)pts[c]+=1;});});}
  });
  const byId=Object.fromEntries(model.candidates.map(c=>[c.id,c]));
  let list=candidateIds.map(id=>{const kept=Math.max(0,pts[id]); return {...byId[id],kept,denom:answered,pct:answered>0?kept/answered*100:0};});
  list.sort((a,b)=> b.pct-a.pct || a.name.localeCompare(b.name));
  let rank=0,prev=null;
  list=list.map((c,i)=>{ if(prev===null||Math.abs(c.pct-prev)>1e-9){rank=i+1;prev=c.pct;} return {...c,rank}; });
  return {list,answered};
}

/* Cohérence pré/post : concordance pondérée par le HAUT du classement. */
function coherence(preIds, postList){
  if(!preIds||!preIds.length) return null;
  const prePos={}; preIds.forEach((id,i)=>prePos[id]=i+1);
  const postPos={}; postList.forEach(c=>postPos[c.id]=c.rank);
  const ids=postList.map(c=>c.id).filter(id=>id in prePos);
  let wSum=0,wConc=0;
  for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++){
    const a=ids[i],b=ids[j];
    if(postPos[a]===postPos[b]) continue;               // égalité réelle → pas de contrainte
    const w=1/Math.min(postPos[a],postPos[b]);          // le haut pèse plus
    wSum+=w;
    if(Math.sign(prePos[a]-prePos[b])===Math.sign(postPos[a]-postPos[b])) wConc+=w;
  }
  return wSum>0 ? Math.round(wConc/wSum*100) : null;
}
function coherenceMsg(x){ for(const e of COHERENCE) if(x<=e.max) return e.msg; return COHERENCE[COHERENCE.length-1].msg; }

function RichText({text}){
  const nav=useContext(Nav);
  const lines=String(text).split("\n");
  const out=[]; let bullets=[];
  const flush=()=>{ if(bullets.length){ out.push(<ul key={"u"+out.length}>{bullets.map((b,i)=><li key={i}>{withLinks(b,nav)}</li>)}</ul>); bullets=[]; } };
  lines.forEach(l=>{ const t=l.trim();

    else { flush(); if(t) out.push(<p key={"p"+out.length}>{withLinks(t,nav)}</p>); }

}

/* ═══════════════ Préclassement (drag & drop, tactile) ═══════════════ */
function PreClass({candObjs,onValidate,onSkip}){
  const [order,setOrder]=useState(()=>candObjs.map(c=>c.id));
  const [dragId,setDragId]=useState(null);
  const byId=Object.fromEntries(candObjs.map(c=>[c.id,c]));
  const itemRefs=useRef({});
  const move=(i,d)=>{const a=[...order];const j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];setOrder(a);};
  const onDown=(e,id)=>{ setDragId(id); try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){} };
  const onMove=(e)=>{ if(!dragId)return; e.preventDefault(); const y=e.clientY; let count=0;
    order.forEach(id=>{ if(id===dragId)return; const el=itemRefs.current[id]; if(!el)return;
      const r=el.getBoundingClientRect(); if(y>r.top+r.height/2)count++; });
    const without=order.filter(x=>x!==dragId); without.splice(count,0,dragId);
    if(without.join("|")!==order.join("|")) setOrder(without);
  };
  const onUp=()=>setDragId(null);
  return (
    <div className="page wrap fade" style={{maxWidth:720}}>
      <p className="eyebrow">Avant de commencer</p>
      <h2 className="section-title">Votre classement initial</h2>

      <div className="rank-list">
        {order.map((id,i)=>{const c=byId[id];return (
          <div className={"rank-item"+(dragId===id?" dragging":"")} key={id} ref={el=>itemRefs.current[id]=el}>
            <button className="grip" onPointerDown={e=>onDown(e,id)} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp} aria-label="Glisser pour déplacer">{Ico.grip}</button>
            <span className="pos serif">{i+1}</span>
            <Avatar name={c.name} size={38}/>
            <div className="who"><div className="nm">{c.name}</div><div className="pty"><Logo name={c.name}/>{partyOf(c.name,c.party)}</div></div>
            <div className="moves">
              <button onClick={()=>move(i,-1)} disabled={i===0} aria-label="Monter">{Ico.up}</button>
              <button onClick={()=>move(i,1)} disabled={i===order.length-1} aria-label="Descendre">{Ico.down}</button>
            </div>
          </div>);})}
      </div>
      <div className="row-gap">
        <button className="btn btn-gold" onClick={()=>onValidate([...order])}>Valider mon classement {Ico.arrow}</button>
        <button className="btn-quiet" onClick={onSkip}>Passer cette étape</button>
      </div>
    </div>
  );
}

/* ═══════════════ Tutoriel interactif (spotlight pas-à-pas) ═══════════════ */
function SpotlightTour({steps,onDone}){
  const [i,setI]=useState(0);
  const [rect,setRect]=useState(null);
  const measure=()=>{ const el=steps[i].get(); if(!el){setRect(null);return;} const r=el.getBoundingClientRect(); setRect({top:r.top,left:r.left,width:r.width,height:r.height}); };
  useLayoutEffect(()=>{ const el=steps[i].get(); if(el)el.scrollIntoView({block:"center",behavior:"smooth"}); const t=setTimeout(measure,380); return ()=>clearTimeout(t); },[i]);
  useEffect(()=>{ const h=()=>measure(); window.addEventListener("resize",h); window.addEventListener("scroll",h,true); const iv=setInterval(measure,400);
    return ()=>{window.removeEventListener("resize",h);window.removeEventListener("scroll",h,true);clearInterval(iv);}; },[i]);
  const last=i===steps.length-1, pad=10;
  const vw=window.innerWidth, vh=window.innerHeight;
  let tip;
  if(rect){ const below=rect.top<vh*0.55;
    tip = below ? {top:rect.top+rect.height+pad+10} : {bottom:vh-rect.top+pad+10};
    tip.left=Math.min(Math.max(12,rect.left), Math.max(12,vw-342));
  } else tip={top:vh*0.4,left:Math.max(12,vw/2-165)};
  return (
    <div className="tour">
      <div className="tour-catch"/>
      {rect && <div className="tour-hole" style={{top:rect.top-pad,left:rect.left-pad,width:rect.width+pad*2,height:rect.height+pad*2}}/>}
      <div className="tour-tip" style={tip}>
        <p>{steps[i].text}</p>
        <div className="tour-foot">
          <span className="tour-dots">{steps.map((_,k)=><i key={k} className={k===i?"on":""}/>)}</span>
          <div className="row-gap" style={{gap:8}}>
            <button className="btn-quiet" onClick={onDone}>Passer</button>
            <button className="btn btn-gold" onClick={()=>last?onDone():setI(i+1)}>{last?"Commencer":"Suivant"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ Test (préclassement → tuto → run → résultats) ═══════════════ */
function Quiz({model,config,title,onExit}){
  const questions=useMemo(()=>buildQuestions(model,config),[model,config]);
  const candObjs=useMemo(()=>config.candidateIds.map(id=>model.candidates.find(c=>c.id===id)).filter(Boolean),[config,model]);
  const [phase,setPhase]=useState("preclass");
  const [preOrder,setPreOrder]=useState(null);
  const [idx,setIdx]=useState(0);
  const [answers,setAnswers]=useState({});
  const [tab,setTab]=useState("synth");
  const [theme,setTheme]=useState("__all__");
  const [showMeasures,setShowMeasures]=useState(false);
  const nav=useContext(Nav);

  if(questions.length===0)
    return <div className="page wrap fade"><div className="empty">Aucune mesure ne correspond à cette sélection.<br/><button className="btn btn-ghost mt" onClick={onExit}>Retour</button></div></div>;

  /* ---- Préclassement ---- */
  if(phase==="preclass")
    return <PreClass candObjs={candObjs}
      onValidate={o=>{setPreOrder(o);setPhase("tuto");}}
      onSkip={()=>{setPreOrder(null);setPhase("tuto");}}/>;

  /* ---- Tutoriel ---- */
  if(phase==="tuto")
    return <TutoExample q={questions[0]} onDone={()=>setPhase("run")}/>;

  /* ---- Résultats ---- */
  if(phase==="results"){
    const byId=Object.fromEntries(model.candidates.map(c=>[c.id,c]));
    const allPairs=questions.map((q,i)=>({q,a:answers[i]}));
    const full=tally(allPairs,config.candidateIds,model);
    const coh=coherence(preOrder, full.list);
    const themesOrder=[]; questions.forEach(q=>{if(!themesOrder.includes(q.theme))themesOrder.push(q.theme);});
    const themePairs = theme==="__all__" ? allPairs : allPairs.filter(p=>p.q.theme===theme);
    const themeRank = tally(themePairs,config.candidateIds,model);

    const RankList=({list})=>(<div>{list.map(c=>(
      <div className="rrow" key={c.id}>
        <span className="rk serif" style={{color:colorOf(c.name)}}>{c.rank}</span>

        <div className="who"><div className="nm">{c.name}</div><div className="pty"><Logo name={c.name}/>{partyOf(c.name,c.party)}</div></div>
        <div className="bar"><i style={{width:Math.max(2,c.pct)+"%",background:colorOf(c.name)}}/></div>
        <div className="rk-score serif" style={{color:colorOf(c.name)}}>{c.kept}</div>
      </div>))}</div>);

    return (
      <div className="page wrap fade">

        </div></div>

        <div className="segmented">
          <button aria-current={tab==="synth"} onClick={()=>setTab("synth")}>Classement</button>
          <button aria-current={tab==="theme"} onClick={()=>setTab("theme")}>Par thème</button>
          {preOrder && <button aria-current={tab==="cmp"} onClick={()=>setTab("cmp")}>Comparer</button>}
        </div>

        {tab==="synth" && <div className="fade"><RankList list={full.list}/></div>}

        {tab==="theme" && (
          <div className="fade">
            <div className="theme-picker">
              <label className="muted" style={{fontSize:14}}>Thème :</label>
              <select value={theme} onChange={e=>{setTheme(e.target.value);}}>
                <option value="__all__">Tous les thèmes</option>
                {themesOrder.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              <button className="btn-quiet" onClick={()=>setShowMeasures(s=>!s)}>{showMeasures?"Masquer le détail des mesures":"Détail des mesures"}</button>
            </div>
            <RankList list={themeRank.list}/>
            {showMeasures && (
              <div className="measures fade">
                {questions.map((q,qi)=> (theme!=="__all__"&&q.theme!==theme)?null:(
                  <div className="measure" key={qi}>
                    <div className="ml">{q.label}</div>
                    {(()=>{const a=answers[qi];
                      if(!a||a.type==="ignore")return <div className="muted" style={{fontSize:14}}>Mesure ignorée.</div>;
                      if(a.type==="none")return <div className="muted" style={{fontSize:14}}>Aucune proposition retenue — pénalité appliquée à toutes les listes.</div>;
                      const opts=q.options.filter(o=>a.optIds.includes(o.id));
                      return opts.map(opt=>(
                        <div className="kept" key={opt.id}>{opt.text}
                          <div className="cred">{opt.candidateIds.map(cid=>byId[cid]).filter(Boolean).map(c=>(
                            <span className="chip" key={c.id}><Avatar name={c.name} size={22}/><b>{c.name}</b></span>))}</div>
                        </div>));
                    })()}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {tab==="cmp" && preOrder && (
          <div className="fade compare-grid">
            <div className="compare-col"><h4>Avant le test</h4>
              {preOrder.map((id,i)=>{const c=byId[id];return <div className="cmp" key={id}><span className="n serif">{i+1}</span><span className="dot" style={{background:colorOf(c.name)}}/><span className="nm">{c.name}</span></div>;})}
            </div>
            <div className="compare-col"><h4>Après le test</h4>
              {full.list.map((c)=>{const before=preOrder.indexOf(c.id)+1; const d=before?before-c.rank:0;
                return <div className="cmp" key={c.id}><span className="n serif">{c.rank}</span><span className="dot" style={{background:colorOf(c.name)}}/><span className="nm">{c.name}</span>
                  <span className="delta muted">{d>0?`▲ ${d}`:d<0?`▼ ${-d}`:"="}</span></div>;})}
            </div>
          </div>
        )}

        <div className="row-gap mt">
          <button className="btn-quiet" onClick={()=>{setAnswers({});setIdx(0);setPhase("preclass");setTab("synth");setShowMeasures(false);}}>Recommencer</button>
          <button className="btn-quiet" onClick={onExit}>Quitter</button>
        </div>
      </div>
    );
  }

  /* ---- Déroulé des mesures ---- */
  const q=questions[idx], a=answers[idx];
  const set=val=>setAnswers({...answers,[idx]:val});
  const togglePick=oid=>{let cur=(a&&a.type==="pick")?a.optIds:[];cur=cur.includes(oid)?cur.filter(x=>x!==oid):[...cur,oid];set(cur.length?{type:"pick",optIds:cur}:undefined);};
  const special=type=>set(a&&a.type===type?undefined:{type});
  const isPicked=oid=>a&&a.type==="pick"&&a.optIds.includes(oid);
  const goNext=()=>idx<questions.length-1?setIdx(i=>i+1):setPhase("results");
  const bg=imgTheme(q.theme);
  return (
    <div className="page wrap fade">
      <div className="quiz-head"><span className="count">Mesure {idx+1} / {questions.length}</span></div>
      <div className="progress"><i style={{width:(idx/questions.length)*100+"%"}}/></div>
      <div className="q-stage" key={idx}>
        <div className={"q-bg"+(bg?"":" fallback")} style={bg?{backgroundImage:`url("${bg}")`}:null}/>
        <div className="q-scrim"/>
        <div className="q-content">
          <div className="q-theme">{q.theme}</div>
          <h2 className="q-label">{q.label}</h2>
          <div className="options">
            {q.options.map(o=>(
              <button key={o.id} className="opt" aria-pressed={isPicked(o.id)} onClick={()=>togglePick(o.id)}>
                <span className="tick">{isPicked(o.id)?Ico.check:null}</span>{o.text}
              </button>))}
          </div>
          <div className="special">
            <button className="opt none" aria-pressed={a&&a.type==="none"} onClick={()=>special("none")}>Aucune de ces propositions</button>
            <button className="opt ign" aria-pressed={a&&a.type==="ignore"} onClick={()=>special("ignore")}>Ignorer cette mesure</button>
          </div>
        </div>
      </div>
      <div className="quiz-nav">
        <button className="btn btn-ghost" onClick={idx===0?()=>setPhase("tuto"):()=>setIdx(i=>i-1)}>{idx===0?"Retour":"Précédent"}</button>
        <button className="btn btn-gold" onClick={goNext}>{idx<questions.length-1?<>Suivant {Ico.arrow}</>:<>Voir les résultats {Ico.arrow}</>}</button>
      </div>
    </div>
  );
}
/* petit utilitaire retiré (les liens sont appliqués via withLinks + nav) */

function Simple({model,onExit}){
  const config=useMemo(()=>{
    const ids=TEST_CANDS.map(n=>model.candidates.find(c=>c.name.toLowerCase()===String(n).toLowerCase())).filter(Boolean).map(c=>c.id);
    return {candidateIds:ids,priorities:new Set([TEST_PRIO]),themes:null};
  },[model]);
  if(config.candidateIds.length===0)
    return <div className="page wrap"><div className="empty">Aucun des noms de <code>test.candidats</code> (config.js) n'a été trouvé dans le tableur.<br/><button className="btn btn-ghost mt" onClick={onExit}>Retour</button></div></div>;
  return <div className="quiz"><Quiz model={model} config={config} title="Faire le test" onExit={onExit}/></div>;
}
function Advanced({model,onExit}){
  const [config,setConfig]=useState(null);
  if(!config) return <AdvancedConfig model={model} onStart={setConfig}/>;
  return <div className="quiz"><Quiz model={model} config={config} title="Comparateur avancé" onExit={()=>setConfig(null)}/></div>;
}

/* ═══════════════ Onglet Données (liens vers les programmes) ═══════════════ */
function DataModal({model,onClose}){
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>Programmes des candidats</h3>
        <p className="muted" style={{fontSize:14,margin:"0 0 10px"}}>Source de chaque proposition utilisée dans l'outil.</p>
        {model.candidates.map(c=>{const lien=candCfg(c.name).lien;return (
          <div className="prog" key={c.id}>
            <Avatar name={c.name} size={38}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700}}>{c.name}</div>
              <div className="muted" style={{fontSize:13,display:"flex",alignItems:"center",gap:6}}><Logo name={c.name}/>{partyOf(c.name,c.party)}</div>
            </div>
            {lien ? <a className="btn btn-outline" href={lien} target="_blank" rel="noopener">Programme {Ico.arrow}</a>
                  : <span className="muted" style={{fontSize:13}}>lien à venir</span>}
          </div>);})}
        <div className="row-gap mt"><button className="btn btn-ghost" onClick={onClose}>Fermer</button></div>
      </div>
    </div>
  );
}

/* ═══════════════ App ═══════════════ */
function App(){
  const [view,setView]=useState("home");
  const [rows,setRows]=useState(null);     // null = chargement ; [] = échec
  const [showData,setShowData]=useState(false);
  const model=useMemo(()=> Array.isArray(rows)&&rows.length ? parseSheet(rows) : null,[rows]);
  const dataState = rows===null ? "loading" : (model ? "ready" : "error");

  useEffect(()=>{ fetch("./Comparaison_programmes.xlsx?t="+Date.now(),{cache:"no-store"})
    .then(r=>{if(!r.ok)throw 0;return r.arrayBuffer();})
    .then(buf=>{const wb=XLSX.read(buf,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];
      const r=XLSX.utils.sheet_to_json(ws,{header:1,defval:""}); setRows(r.length?r:[]);})
    .catch(()=>setRows([])); },[]);

  const go=v=>{setView(v);window.scrollTo({top:0,behavior:"smooth"});};
  const openData=()=>setShowData(true);
  const tabs=[["home","Accueil"],["about","Quel est cet outil ?"]];

  const gate = node => {
    if(dataState==="loading") return <div className="page wrap"><div className="empty">Chargement des données…</div></div>;
    if(dataState==="error")   return <div className="page wrap"><div className="empty">Impossible de charger <code>Comparaison_programmes.xlsx</code>.<br/><span className="muted">En local (fichier ouvert depuis le disque), les données n'apparaissent qu'une fois le site hébergé. Sur GitHub Pages, vérifie que le fichier est bien à la racine du dépôt.</span><br/><button className="btn btn-ghost mt" onClick={()=>go("home")}>Retour</button></div></div>;
    if(model && model.problems.length===0) return <div className="page wrap"><div className="empty">Le tableur ne contient pas encore de mesures.<br/><span className="muted">Renseigne les libellés des problématiques (ligne 2) et les propositions des candidats.</span><br/><button className="btn btn-ghost mt" onClick={()=>go("home")}>Retour</button></div></div>;
    return node;
  };

  return (
    <Nav.Provider value={{go,openData}}>
      <header className="top"><div className="wrap topbar">
        <button className="brand" onClick={()=>go("home")}><Cockade size={32} mark={true}/><span className="name">{T.marque}</span></button>
        <nav className="tabs">{tabs.map(([k,l])=><button key={k} aria-current={view===k} onClick={()=>go(k)}>{l}</button>)}</nav>
      </div></header>

      <main>
        {view==="home"     && <Home go={go}/>}
        {view==="about"    && <About/>}
        {view==="contact"  && <Contact/>}
        {view==="simple"   && gate(<Simple   model={model} onExit={()=>go("home")}/>)}
        {view==="advanced" && gate(<Advanced model={model} onExit={()=>go("home")}/>)}
      </main>

      <footer><div className="wrap foot">
        <a className="ilink" onClick={()=>go("contact")}>Nous contacter</a>
        <button className="btn-quiet" onClick={openData}>Données</button>
      </div></footer>

      {showData && (model ? <DataModal model={model} onClose={()=>setShowData(false)}/>
                         : <div className="modal-bg" onClick={()=>setShowData(false)}><div className="modal" onClick={e=>e.stopPropagation()}><h3>Programmes des candidats</h3><p className="muted">Données indisponibles pour le moment.</p><div className="row-gap mt"><button className="btn btn-ghost" onClick={()=>setShowData(false)}>Fermer</button></div></div></div>)}
    </Nav.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
